# Railway — Railpack (Node) : API Express + option SERVE_SPA pour le front.
# Pas de Dockerfile à la racine : Railway ignorait railway.toml et lançait Nginx sans `npm`.
# Image Nginx uniquement : voir Dockerfile.spa (`docker build -f Dockerfile.spa .`).
# https://docs.railway.app/reference/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "npm ci --include=dev && npm run build:production"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
