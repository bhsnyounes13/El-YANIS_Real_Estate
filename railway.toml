# Railway — déploiement Node (API + SPA) sans le Dockerfile Nginx du repo.
# https://docs.railway.app/reference/config-as-code
#
# Si le build utilise encore Docker : dans le service → Settings → retirer le Dockerfile,
# ou renommer le fichier Dockerfile local (ex. Dockerfile.spa) pour les déplois statiques uniquement.

[build]
builder = "RAILPACK"
buildCommand = "npm ci --include=dev && npm run build:production"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
