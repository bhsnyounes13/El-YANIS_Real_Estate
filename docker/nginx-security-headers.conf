# Réutilisable dans `server { }` et dans chaque `location` qui définit ses propres `add_header`
# (sinon Nginx n’hérite pas les en-têtes du niveau parent — voir nginx add_header).
#
# CSP : ajuster connect-src si l’API est sur un domaine précis (remplacer https: par une liste).
# Turnstile : script + iframe Cloudflare (voir composants Turnstile du frontend).

add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
