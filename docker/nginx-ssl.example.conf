# Exemple : Nginx termine le TLS (certificats Let's Encrypt / volumes Docker).
# Copier vers conf.d ou inclure depuis nginx.conf principal.
#
# Écouter 443 + rediriger 80 → 443 permet d’envoyer HSTS uniquement sur HTTPS.

server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    include /etc/nginx/snippets/elyanis-security-headers.conf;

    # HSTS — uniquement sur cette réponse HTTPS (max-age 2 ans, sous-domaines, preload optionnel).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        include /etc/nginx/snippets/elyanis-security-headers.conf;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/snippets/elyanis-security-headers.conf;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        expires 7d;
        add_header Cache-Control "public";
    }
}
