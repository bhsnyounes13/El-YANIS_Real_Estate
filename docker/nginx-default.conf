# SPA statique — TLS souvent terminé devant (Cloudflare, LB, Ingress).
# Ne pas envoyer Strict-Transport-Security sur ce bloc HTTP :80 seul ;
# utiliser nginx-ssl.example.conf ou les en-têtes au niveau du reverse proxy HTTPS.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    include /etc/nginx/snippets/elyanis-security-headers.conf;

    location / {
        include /etc/nginx/snippets/elyanis-security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        include /etc/nginx/snippets/elyanis-security-headers.conf;
        expires 7d;
        add_header Cache-Control "public";
    }
}
